version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    command: ddtrace-run gunicorn -w 4 -b 0.0.0.0:5000 app:app
    volumes:
      - .:/app
      - ./attachments:/app/attachments
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: mailer_db
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker:
    build: .  # Assuming your Flask app builds from the current directory
    # We run the exact same code, but override the boot command to start Celery instead of Flask
    command: ddtrace-run celery -A app.celery worker --loglevel=info 
    env_file:
      - .env
    volumes:
      - ./attachments:/app/attachments
    depends_on:
      - redis
      - db
  datadog:
    image: gcr.io/datadoghq/agent:latest
    pid: host
    environment:
      - DD_API_KEY=${DD_API_KEY}
      - DD_SITE=us5.datadoghq.com
      - DD_APM_ENABLED=true
      - DD_APM_NON_LOCAL_TRAFFIC=true
      - DD_LOGS_ENABLED=true
      - DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL=true
      - DD_CONTAINER_EXCLUDE="name:datadog" # Prevents the agent from monitoring itself in an infinite loop
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
volumes:
  mysql_data:
